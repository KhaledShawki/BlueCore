name: CI

on:
  push:
  pull_request:

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install clang-format (LLVM 18)
        shell: bash
        run: |
          set -euo pipefail

          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y clang-format-18
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-18 100

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail

          chmod +x scripts/format-check-linux.sh
          ./scripts/format-check-linux.sh

  build-and-test:
    name: ${{ matrix.os }} ${{ matrix.config }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
            config: Debug
            test_script: ./scripts/run-tests-linux.sh

          - os: ubuntu-latest
            runner: ubuntu-latest
            config: Release
            test_script: ./scripts/run-tests-linux.sh

          - os: macos-latest
            runner: macos-latest
            config: Debug
            test_script: ./scripts/run-tests-macos.sh

          - os: macos-latest
            runner: macos-latest
            config: Release
            test_script: ./scripts/run-tests-macos.sh

          - os: windows-latest
            runner: windows-2025-vs2026
            config: Debug
            test_script: scripts\run-tests-windows.cmd

          - os: windows-latest
            runner: windows-2025-vs2026
            config: Release
            test_script: scripts\run-tests-windows.cmd

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y ninja-build
          chmod +x tools/premake/linux/premake5 scripts/*.sh

      - name: Setup macOS dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          brew install ninja
          chmod +x tools/premake/macos/premake5 scripts/*.sh

      - name: Setup MSBuild
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v3
        with:
          vs-version: '[18.0,19.0)'
          msbuild-architecture: x64

      - name: Print MSBuild version
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          where msbuild
          msbuild -version

      - name: Run tests
        if: runner.os != 'Windows'
        shell: bash
        run: ${{ matrix.test_script }} ${{ matrix.config }}_x64

      - name: Run tests
        if: runner.os == 'Windows'
        shell: cmd
        run: ${{ matrix.test_script }} ${{ matrix.config }}_x64
