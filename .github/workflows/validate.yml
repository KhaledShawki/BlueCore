name: Validate

on:
  push:
  pull_request:

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install formatter dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y wget curl unzip

          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y clang-format-18
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-18 100

          python -m pip install --upgrade pip
          python -m pip install black==25.1.0

          curl -L https://github.com/JohnnyMorganz/StyLua/releases/download/v2.1.0/stylua-linux-x86_64.zip -o stylua-linux-x86_64.zip
          unzip -q stylua-linux-x86_64.zip -d stylua-bin
          sudo install stylua-bin/stylua /usr/local/bin/stylua

          clang-format --version
          stylua --version
          black --version

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail

          chmod +x tools/premake/linux/premake5 scripts/*.sh
          ./scripts/premake-linux.sh check-format

  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Validate build graph
        shell: bash
        run: |
          set -euo pipefail

          chmod +x tools/premake/linux/premake5 scripts/*.sh
          ./scripts/premake-linux.sh validate

      - name: Build static and shared configurations
        shell: bash
        run: |
          set -euo pipefail

          chmod +x tools/premake/linux/premake5 scripts/*.sh
          ./tools/premake/linux/premake5 gmake2 --blue-platforms=linux --blue-startup=BlueRunTests
          make -C out/build/gmake config=debug_x64 BlueRunTests BlueTests -j2
          make -C out/build/gmake config=debug_x64_dll BlueRunTests BlueTests -j2
