name: Validate

on:
  push:
  pull_request:

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format (LLVM 18)
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y clang-format-18
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-18 100

      - name: Check formatting
        run: |
          chmod +x scripts/format-check-linux.sh
          ./scripts/format-check-linux.sh

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate build graph
        run: |
          chmod +x tools/premake/linux/premake5 scripts/*.sh
          ./scripts/premake-linux.sh validate

      - name: Build static and shared configurations
        run: |
          set -euo pipefail
          chmod +x tools/premake/linux/premake5
          ./tools/premake/linux/premake5 gmake2 --blue-platforms=linux --blue-startup=BlueRunTests
          make -C out/build/gmake config=debug_x64 BlueRunTests BlueTests -j2
          make -C out/build/gmake config=debug_x64_dll BlueRunTests BlueTests -j2
